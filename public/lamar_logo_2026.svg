<svg width="240" height="110" viewBox="0 0 240 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@1,700&amp;family=Outfit:wght@500&amp;display=swap');
    .text-lamar { font-family: 'Archivo', sans-serif; font-style: italic; font-weight: 700; font-size: 52px; fill: #1A1C20; }
    .text-tagline { font-family: 'Outfit', sans-serif; font-weight: 500; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; fill: #1A1C20; }
  </style>
  
  <!-- Roof line -->
  <path d="M 30 50 Q 90 10 125 12 L 210 52" stroke="#D4AF37" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Chimney -->
  <path d="M 175 25 L 175 14 L 185 14 L 185 32" stroke="#D4AF37" stroke-width="3.5" stroke-linejoin="round" fill="none" />
  
  <!-- Window -->
  <rect x="117" y="24" width="16" height="16" stroke="#D4AF37" stroke-width="3" fill="none" />
  <line x1="125" y1="24" x2="125" y2="40" stroke="#D4AF37" stroke-width="2.5" />
  <line x1="117" y1="32" x2="133" y2="32" stroke="#D4AF37" stroke-width="2.5" />
  
  <!-- Text 'Lamar' -->
  <text x="120" y="75" text-anchor="middle" class="text-lamar">Lamar</text>

  <!-- Bottom Swoosh -->
  <path d="M 25 85 Q 120 110 215 75" stroke="#D4AF37" stroke-width="3.5" stroke-linecap="round" fill="none" />

  <!-- Tagline -->
  <text x="120" y="100" text-anchor="middle" class="text-tagline">Stukadoor en Renovatie</text>
</svg>
